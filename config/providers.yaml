providers:
  default: ollama

  ollama:
    mode: cloud
    base_url_env: OLLAMA_BASE_URL
    api_key_env: OLLAMA_API_KEY
    default_model_env: OLLAMA_MODEL
    timeout_seconds: 120

routing:
  plan: ollama
  execute: ollama
  summarize: ollama

models:
  default_env: DEFAULT_MODEL
  allowed:
    - qwen3:32b
    - llama3.3:70b
    - deepseek-r1:70b
